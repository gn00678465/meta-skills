# .yarnrc.yml for Yarn 4 (Berry) — supply-chain hardening
#
# Place at repo root and commit. Yarn 1 (Classic) is end-of-life; migrate.
# Merge these keys into an existing .yarnrc.yml — do not replace.
#
# ⚠️ AUTH WARNING: Never commit `npmAuthToken`, `npmAuthIdent`, or
# `npmRegistries.<url>.npmAuthToken` lines. Yarn auth lives in `~/.yarnrc.yml`
# (per-user) or comes from a CI env var via interpolation:
#   npmRegistries:
#     "https://registry.npmjs.org":
#       npmAuthToken: "${NPM_TOKEN}"
# (The ${NPM_TOKEN} form is safe to commit — the literal token is not.)
#
# Audit before commit:
#   grep -E 'npmAuthToken|npmAuthIdent' .yarnrc.yml      (bash)
#   Select-String -Path .yarnrc.yml -Pattern 'npmAuthToken|npmAuthIdent'   (pwsh)
#
# Rationale and verification: ../../references/package-managers/yarn.md
# Upstream docs:
#   - https://yarnpkg.com/configuration/yarnrc#npmMinimalAgeGate
#   - https://yarnpkg.com/configuration/yarnrc#enableScripts
#   - https://yarnpkg.com/features/security

# Minimum release age — refuse versions younger than this.
# Requires Yarn >= 4.10 (introduced in berry PR #6901, released 2025-09-18).
# Note: the Yarn security docs page sometimes cites "4.12 introduced" — the
# GitHub release notes are authoritative; 4.10 is the real floor.
# Accepts duration shorthand: "7d", "24h". Lower bound: "3d".
npmMinimalAgeGate: "7d"

# Equivalent of npm's save-exact — no ^/~ on new installs.
defaultSemverRangePrefix: ""

# Defensive explicit policy — listed so reviewers see it and any accidental
# override surfaces in diff. Per Yarn docs (yarnpkg.com/configuration/yarnrc#enableScripts):
# `false` is already the documented default, and it disables `postinstall`
# scripts ONLY for third-party packages. Workspace packages (your own
# monorepo packages) ALWAYS run their own postinstall scripts regardless of
# this setting — Yarn assumes workspace code is trusted because you wrote it.
#
# To re-enable a specific third-party package's postinstall, use
# `dependenciesMeta` in package.json:
#   "dependenciesMeta": {
#     "esbuild": { "built": true },
#     "sharp":   { "built": true }
#   }
enableScripts: false
