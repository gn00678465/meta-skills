# pip configuration — supply-chain hardening
#
# ⚠️ pip does NOT auto-load a pip.conf at the repo root. Pip reads config
# from (in order of precedence):
#   1. The path in $PIP_CONFIG_FILE
#   2. Per-venv: $VIRTUAL_ENV/pip.conf (Linux/macOS) or
#                $VIRTUAL_ENV\pip.ini    (Windows)
#   3. Per-user: $XDG_CONFIG_HOME/pip/pip.conf or ~/.config/pip/pip.conf
#                (legacy fallback: ~/.pip/pip.conf — still loaded if exists)
#                %APPDATA%\pip\pip.ini   (Windows — different filename!)
#   4. System:   /etc/pip.conf or /etc/xdg/pip/pip.conf
#
# To use this file, pick one of:
#   - Set PIP_CONFIG_FILE=<path-to-this-file> in your shell or CI runner
#   - Copy this file into one of the locations above (rename to pip.ini on Windows)
#
# Upstream docs: https://pip.pypa.io/en/stable/topics/configuration/#location
# Rationale and CI wiring: ../../references/package-managers/pip.md

[install]
# Minimum release age — refuse versions younger than this.
# Requires pip >= 26.1 for the ISO 8601 duration form (P7D = "at least 7 days").
# Pip 26.0 accepted only absolute datetimes — see pip.md for the date-based
# alternative if you can't upgrade past 26.0.
#
# Lower bound: P3D (3 days). Do not weaken without a written reason.
uploaded-prior-to = P7D
