# bunfig.toml — supply-chain hardening
#
# Place at repo root, or ~/.bunfig.toml for global defaults.
# Merge these keys into an existing bunfig.toml — do not replace.
#
# Rationale and verification: ../../references/package-managers/bun.md
# Upstream docs:
#   - https://bun.com/docs/runtime/bunfig#installminimumreleaseage
#   - https://bun.com/docs/runtime/bunfig#installlinker
#   - https://bun.com/docs/install/lifecycle

[install]
# Minimum release age — refuse versions younger than this.
# Requires Bun >= 1.2. Unit: SECONDS (not minutes like pnpm, not days like npm).
# 604800 = 7 days. Lower bound: 259200 (3 days). Do not weaken without a
# written reason approved by the security team.
minimumReleaseAge = 604800

# ⚠️ ignoreScripts disables ALL lifecycle scripts, INCLUDING packages listed
# in `trustedDependencies` in package.json. This is more aggressive than the
# pnpm/Yarn equivalents — it overrides the allowlist, not extends it.
#
# Recommended workflow:
#   1. Leave ignoreScripts unset; Bun already doesn't run scripts for most
#      third-party packages by default.
#   2. Use `trustedDependencies` in package.json to opt specific packages in.
#   3. Enable ignoreScripts ONLY for high-risk environments where you have
#      built native packages out-of-band (or use a vendoring proxy).
#
# Uncomment to enable. Test that all your native-build deps still work BEFORE
# committing this — esbuild, sharp, prisma, etc. will not run their builds.
# ignoreScripts = true

# ⚠️ DO NOT set `linker = "hoisted"`. Phantom-dependency protection comes
# from the `isolated` linker, which Bun uses by default for NEW WORKSPACES
# (post-v1.3.2). HOWEVER:
#   - Single-package projects default to `hoisted`.
#   - Projects created before Bun 1.3.2 may still be on `hoisted`.
# Check your current setting with `bun pm config get install.linker`. If it
# returns `hoisted`, explicitly set `linker = "isolated"` below.
#
# linker = "isolated"
